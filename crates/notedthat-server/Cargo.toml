[package]
name = "notedthat-server"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
notedthat-core = { path = "../notedthat-core", version = "0.1.0" }
notedthat-storage-s3 = { path = "../notedthat-storage-s3", version = "0.1.0" }
notedthat-api-http = { path = "../notedthat-api-http", version = "0.1.0" }
anyhow.workspace = true
async-trait.workspace = true
axum = { workspace = true, features = ["http1", "tokio"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal"] }
tower.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["ansi", "env-filter", "fmt", "json"] }
thiserror.workspace = true

[[bin]]
name = "notedthat-server"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[dev-dependencies]
notedthat-api-http = { path = "../notedthat-api-http", version = "0.1.0", features = ["test-support"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
testcontainers.workspace = true
reqwest = { version = "0.12", default-features = false, features = ["json"] }
serde_json.workspace = true
temp-env = "0.3"

[lints]
workspace = true
