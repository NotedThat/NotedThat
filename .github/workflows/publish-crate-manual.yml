name: Publish crate (manual)

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        type: choice
        options:
          - notedthat-core
          - notedthat-storage-s3
          - notedthat-indexer
          - notedthat-write
          - notedthat-api-http
          - notedthat-webdav
          - notedthat-mcp
          - notedthat-server
          - notedthat-mcp-stdio

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: "Publish ${{ inputs.crate }}"
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      # Mint short-lived OIDC token for crates.io (trusted publishing)
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p "${{ inputs.crate }}"
