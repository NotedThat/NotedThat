name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --locked

  clippy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Dry-run Dockerfile build on every push and PR. Catches breakage before
  # release-plz can tag a broken commit. Runs the reusable docker.yml with
  # push=false — no GHCR login, no cosign, no secrets required (safe for
  # fork PRs). The upper bound on permissions here matches what the reusable
  # workflow declares at job level, even though push=false uses none of them.
  docker-build:
    name: Docker Build
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
      attestations: write
    with:
      push: false

  integration-test:
    name: Integration tests (SeaweedFS testcontainer)
    needs: [test, clippy, fmt]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && github.repository == 'NotedThat/NotedThat'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --locked -- --include-ignored

  # release-plz-release and release-plz-pr MUST stay INDEPENDENT parallel jobs
  # per the official release-plz quickstart. Two constraints from upstream docs
  # (https://release-plz.dev/docs/github/quickstart#3-setup-the-workflow):
  #
  #   1. release-plz-pr MUST NOT `needs:` release-plz-release. The dependency
  #      serializes them for no benefit, and skips the PR update whenever the
  #      release job fails, leaving the release PR permanently stale against
  #      the current HEAD.
  #
  #   2. release-plz-release MUST NOT have a `concurrency:` block. GitHub
  #      cancels a *pending* run when a newer run for the same group is queued
  #      (independent of `cancel-in-progress`), so a rapid three-commit
  #      sequence to main causes commit 2's release to be silently dropped —
  #      its version never gets tagged or published to crates.io.
  #
  # release-plz-pr keeps a concurrency block: skipping a stale release-PR
  # update is safe because the newest queued run produces a fresh, correct PR
  # against the current HEAD.
  release-plz-release:
    name: Tag and publish crates
    needs: [test, clippy, fmt, docker-build, integration-test]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && github.repository == 'NotedThat/NotedThat'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Open / update release PR
    needs: [test, clippy, fmt, docker-build, integration-test]
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && github.repository == 'NotedThat/NotedThat'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          config: release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
