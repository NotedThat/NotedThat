# Tag-triggered release pipeline.
#
# Fired by the `vX.Y.Z` tag that `release-plz-release` pushes from ci.yml
# after merging the release PR. This workflow does NOT publish to crates.io
# (that already happened in ci.yml) and does NOT create the GitHub Release
# from scratch (release-plz-release already did that with the CHANGELOG body).
# Instead it appends binary + container artifacts to the existing release.
#
# Pipeline:
#   plan   → cargo-dist scans the workspace and emits a build matrix.
#   build  → cross-compile every (crate, target) pair into archives + loose
#            binaries under target/dist/.
#   attest → generate SLSA L2 provenance for every artifact via
#            actions/attest-build-provenance.
#   sign   → cosign keyless sign-blob every executable, emitting sidecar
#            *.bundle files.
#   docker → call the reusable docker.yml with push=true, sign=true, which
#            builds + pushes + cosign-signs + attests the container image.
#   release → download all artifacts and append them (assets only, not body)
#             to the existing GitHub Release created by release-plz.
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked --version 0.32.0

      - name: Plan release
        id: plan
        run: |
          dist plan --output-format=json > dist-manifest.json
          {
            echo 'manifest<<EOF'
            cat dist-manifest.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: dist-manifest
          path: dist-manifest.json

  build:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.manifest).build-matrix }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked --version 0.32.0

      - name: Build binaries
        run: dist build --target=${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: target/dist

  attest:
    name: Generate binary attestations
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'artifacts/artifacts-*/*'

  sign:
    name: Sign binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: "v2.4.0"

      # cosign sign-blob against every executable file. cargo-dist emits both
      # archives (.tar.xz / .zip — not executable, skipped by the -x test)
      # and loose binaries (executable — signed). Bundle mode writes the
      # signature + certificate as a single .bundle sidecar.
      - name: Sign binaries with cosign (keyless)
        run: |
          set -euo pipefail
          for artifact_dir in artifacts/artifacts-*/; do
            for binary in "${artifact_dir}"*; do
              if [ -f "${binary}" ] && [ -x "${binary}" ]; then
                echo "Signing: ${binary}"
                cosign sign-blob \
                  --bundle "${binary}.bundle" \
                  --yes \
                  "${binary}"
              fi
            done
          done

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signed-artifacts
          path: artifacts

  # Container image publish + cosign + SLSA provenance. Delegates to the
  # reusable docker.yml so the recipe stays identical to CI validation.
  docker:
    name: Publish Docker image
    uses: ./.github/workflows/docker.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write
      attestations: write
    with:
      push: true
      sign: true
      ref: ${{ github.ref_name }}
      tag_name: ${{ github.ref_name }}

  # Append binary artifacts + attestations to the existing release created
  # by release-plz-release. `append_body: false` protects the CHANGELOG body
  # release-plz wrote; assets are added alongside it.
  release:
    name: Attach artifacts to GitHub Release
    needs: [plan, build, attest, sign, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/artifacts-*/*
            release-artifacts/signed-artifacts/**/*
            release-artifacts/dist-manifest/dist-manifest.json
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          append_body: false
          fail_on_unmatched_files: false
          make_latest: 'true'
